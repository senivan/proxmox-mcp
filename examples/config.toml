[server]
host = "0.0.0.0"
port = 8443

[tls]
enabled = true
cert_file = "/etc/proxmox-mcp/tls/server.crt"
key_file = "/etc/proxmox-mcp/tls/server.key"
client_ca_file = "/etc/proxmox-mcp/tls/ca.crt"
require_client_cert = false

[remote]
mode = "allow-listed"
approval_store = "/var/lib/proxmox-mcp/approvals.json"

[audit]
file = "/var/lib/proxmox-mcp/audit.jsonl"

[guest_exec]
default_timeout_seconds = 30
max_output_bytes = 65536
poll_interval_seconds = 1
local_node_name = "pve1"

# Optional SSH fallback targets for QEMU guests without guest agent:
# [guest_exec.ssh_targets.app1]
# node = "pve1"
# vmid = 101
# type = "qemu"
# host = "10.0.0.50"
# user = "root"
# port = 22
# private_key_file = "/etc/proxmox-mcp/ssh/id_ed25519"
# known_hosts_file = "/etc/proxmox-mcp/ssh/known_hosts"
# strict_host_key_checking = true

[proxmox]
base_url = "https://127.0.0.1:8006/api2/json"
token_id = "mcp@pam!default"
token_secret = "replace-me"
verify_tls = true

[profiles.readonly]
capabilities = ["inventory.read", "node.read", "vm.read", "task.read", "storage.read", "vm.snapshot.read"]

[profiles.operator]
capabilities = ["inventory.read", "node.read", "vm.read", "task.read", "storage.read", "vm.power", "vm.snapshot.read", "vm.snapshot.write", "vm.guest.exec"]

[clients.ops_laptop]
token = "replace-me"
profile = "readonly"
# Optional client certificate bindings when mTLS is enabled:
# tls_client_common_name = "ops-laptop"
# tls_client_fingerprint_sha256 = "0123456789abcdef..."

[clients.ops_console]
token = "replace-me-too"
profile = "operator"
